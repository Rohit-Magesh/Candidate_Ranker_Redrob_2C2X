# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Our solution ranks candidates using a multi-stage pipeline that combines semantic relevance, structured feature engineering, behavioral signals, and penalty-based filtering. Candidate profiles and the job description are parsed into normalized representations. 
  Semantic similarity is computed using TF-IDF vectorization to estimate textual relevance between each candidate and the job description.
  Additional features evaluate experience, skill overlap, job title relevance, production ML exposure, project quality, company relevance, education, career stability, 
  and location fit. Behavioral signals such as recruiter response rate, profile completeness, GitHub activity, interview completion, and recent activity are combined 
  into a bounded multiplier that rewards engaged candidates. Penalties are applied for keyword stuffing, inconsistent career history, inactive profiles, research-only 
  backgrounds, excessive service-company experience, and lack of production deployment evidence. A weighted scoring function aggregates all signals into a final ranking 
  score, after which candidates are sorted and the top 100 are selected. Scores are normalized into an intuitive confidence range, and an automated reasoning module 
  generates concise explanations for each ranked candidate. The pipeline is deterministic, reproducible, CPU-efficient, and packaged as a Docker image for 
  straightforward evaluation.

